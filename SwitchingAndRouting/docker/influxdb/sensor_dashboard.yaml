apiVersion: influxdata.com/v2alpha1
kind: Dashboard
metadata:
  name: sad-tu-28a001
spec:
  name: Data NodeRed
  description: Filtered data from NodeRed
  charts:
    - kind: Single_Stat
      name: Current X
      width: 4
      height: 4
      decimalPlaces: 2
      colors:
        - id: base
          name: laser
          type: text
          hex: "#00C9FF"
      staticLegend: {}
      queries:
        - query: >
            from(bucket: "sensordata")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "joystick")
              |> filter(fn: (r) => r["_field"] == "x")
              |> aggregateWindow(every: 1s, fn: last, createEmpty: false)
              |> yield(name: "last")

    - kind: Single_Stat
      name: Current Y
      width: 4
      height: 4
      xPos: 4
      decimalPlaces: 2
      colors:
        - id: base
          name: laser
          type: text
          hex: "#00C9FF"
      staticLegend: {}
      queries:
        - query: >
            from(bucket: "sensordata")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "joystick")
              |> filter(fn: (r) => r["_field"] == "y")
              |> aggregateWindow(every: 1s, fn: last, createEmpty: false)
              |> yield(name: "last")

    - kind: Single_Stat
      name: Buttons Average 24h
      width: 4
      height: 4
      yPos: 4
      decimalPlaces: 2
      colors:
        - id: base
          name: laser
          type: text
          hex: "#00C9FF"
      staticLegend: {}
      queries:
        - query: >
            from(bucket: "sensordata")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "buttons")
              |> filter(fn: (r) => r["_field"] == "b1" or r["_field"] == "b2")
              |> aggregateWindow(every: 24h, fn: mean, createEmpty: false)
              |> yield(name: "mean")

    - kind: Xy
      name: Buttons
      width: 8
      height: 4
      yPos: 8
      geom: step
      shade: true
      hoverDimension: auto
      position: overlaid
      opacity: 1
      colorizeRows: true
      legendColorizeRows: true
      legendOpacity: 1
      legendOrientationThreshold: 100000000
      orientationThreshold: 100000000
      widthRatio: 1
      xCol: _time
      yCol: _value
      yTickStep: 1
      yTotalTicks: 2
      generateYAxisTicks:
        - yTickStep
        - yTickStart
        - yTotalTicks
      axes:
        - name: x
          base: "10"
          scale: linear
        - name: y
          base: "2"
          scale: linear
      colors:
        - id: HRY_MVTxtQUn9dPxAUJOb
          name: Nineteen Eighty Four
          type: scale
          hex: "#31C0F6"
        - id: 3iLjGW7UF81-c83aynpAm
          name: Nineteen Eighty Four
          type: scale
          hex: "#A500A5"
        - id: 89p8ZPH8xeRTaMWAWJucY
          name: Nineteen Eighty Four
          type: scale
          hex: "#FF7E27"
      staticLegend:
        colorizeRows: true
        opacity: 1
        orientationThreshold: 100000000
        widthRatio: 1
      queries:
        - query: >
            from(bucket: "sensordata")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "buttons")
              |> filter(fn: (r) => r["_field"] == "b1" or r["_field"] == "b2")
              |> aggregateWindow(every: 1s, fn: mean, createEmpty: false)
              |> yield(name: "mean")
